services:
  postgres:
    image: postgres:16-alpine
    container_name: places-app-postgres
    environment:
      POSTGRES_USER: places
      POSTGRES_PASSWORD: places
      POSTGRES_DB: places_app
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U places -d places_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: places-app-backend
    environment:
      DATABASE_URL: postgresql://places:places@postgres:5432/places_app?schema=public
      PORT: 8000
      WEATHER_CACHE_TTL_HOURS: 6
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  prisma-studio:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: places-app-prisma-studio
    environment:
      DATABASE_URL: postgresql://places:places@postgres:5432/places_app?schema=public
    command: ["node_modules/.bin/prisma", "studio", "--config=./prisma.config.ts", "--browser", "none", "--port", "5555"]
    ports:
      - "5555:5555"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: places-app-frontend
    environment:
      BACKEND_GRAPHQL_ENDPOINT: http://backend:8000/graphql
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
