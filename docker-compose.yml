services:
  postgres:
    image: postgres:16-alpine
    container_name: weather-app-postgres
    environment:
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather
      POSTGRES_DB: weather_app
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: weather-app-backend
    environment:
      DATABASE_URL: postgresql://weather:weather@postgres:5432/weather_app?schema=public
      PORT: 8000
      WEATHER_CACHE_TTL_HOURS: 6
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  prisma-studio:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: weather-app-prisma-studio
    environment:
      DATABASE_URL: postgresql://weather:weather@postgres:5432/weather_app?schema=public
    ports:
      - "5555:5555"
    depends_on:
      postgres:
        condition: service_healthy
    command: pnpm run studio:docker

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: weather-app-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
